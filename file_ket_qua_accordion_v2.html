
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .wrap { padding: 12px 0; font-family: var(--font-sans); }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
    margin-bottom: 8px;
  }
  .section-title { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 500; color: #1a3a8f; }
  .card-list { display: flex; flex-direction: column; gap: 8px; }
  .file-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .file-card:hover { border-color: #93bbf0; }
  .file-card.selected { border: 1.5px solid #1a5cd6; }
  .card-top { display: flex; align-items: center; gap: 12px; padding: 13px 16px; }
  .pdf-icon {
    width: 34px; height: 34px; flex-shrink: 0;
    background: #fff0f0; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    border: 0.5px solid #fdd0d0;
  }
  .pdf-icon i { font-size: 17px; color: #d63030; }
  .card-main { flex: 1; min-width: 0; }
  .card-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .view-link {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 13px; color: #1a5cd6; text-decoration: none; cursor: pointer;
  }
  .view-link i { font-size: 14px; }
  .toggle-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 10px 5px 12px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 20px; cursor: pointer;
    font-size: 12px; color: var(--color-text-secondary);
    flex-shrink: 0; white-space: nowrap;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    user-select: none;
  }
  .toggle-btn:hover { background: #eaf2ff; color: #1a4fa3; border-color: #c4d9f7; }
  .toggle-btn.open { background: #eaf2ff; color: #1a4fa3; border-color: #c4d9f7; }
  .toggle-btn i { font-size: 13px; transition: transform 0.22s ease; }
  .toggle-btn.open i { transform: rotate(180deg); }
  .services-body {
    overflow: hidden; max-height: 0;
    transition: max-height 0.28s ease, padding 0.2s ease;
    padding: 0 16px;
  }
  .services-body.open {
    max-height: 500px; padding: 10px 16px 14px;
    border-top: 0.5px solid var(--color-border-tertiary);
  }
  .services-label { font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { font-size: 12px; padding: 3px 10px; background: #eaf2ff; color: #1a4fa3; border-radius: 20px; border: 0.5px solid #c4d9f7; }
</style>

<div class="wrap">
  <h2 class="sr-only">File kết quả với tên phiếu số</h2>
  <div class="section-header">
    <div class="section-title">
      <i class="ti ti-folder-open" aria-hidden="true"></i>
      File kết quả
    </div>
    <i class="ti ti-chevron-up" style="font-size:18px;color:#1a3a8f;" aria-hidden="true"></i>
  </div>
  <div class="card-list" id="cardList"></div>
</div>

<script>
const files = [
  { name: "Phiếu 1462348", services: ["Siêu âm ổ bụng tổng quát", "Siêu âm tuyến giáp"] },
  { name: "Phiếu 1462349", services: ["Siêu âm tim", "Siêu âm Doppler mạch máu"] },
  { name: "Phiếu 1462350", services: ["Công thức máu toàn phần", "Đông máu cơ bản", "Nhóm máu ABO-Rh"] },
  {
    name: "Phiếu 1462352", isSelected: true,
    services: [
      "Định lượng Urê máu [Máu]", "Định lượng Creatinin (máu)", "Định lượng Glucose [Máu]",
      "Định lượng Acid Uric [Máu]", "Điện giải đồ (Na, K, Cl) [Máu]",
      "Định lượng Protein toàn phần [Máu]", "Định lượng Triglycerid (máu)",
      "Định lượng Cholesterol toàn phần", "Đo hoạt độ ALT (GPT)", "Đo hoạt độ AST (GOT)",
      "Định lượng HbA1c [Máu]", "Định lượng HDL-C [Máu]",
      "Định lượng LDL-C [Máu]", "Định lượng TSH [Máu]"
    ]
  },
  { name: "Phiếu 1462355", services: ["Xét nghiệm nước tiểu", "Cấy nước tiểu định danh vi khuẩn"] },
  { name: "Phiếu 1462361", services: ["Điện tim (ECG) 12 chuyển đạo", "X-quang ngực thẳng"] },
  { name: "Phiếu 1462374", services: ["Xét nghiệm HIV", "Viêm gan B (HBsAg)", "Viêm gan C (Anti-HCV)"] },
];

const openSet = new Set();

function toggle(id, e) {
  e.stopPropagation();
  openSet.has(id) ? openSet.delete(id) : openSet.add(id);
  const btn = document.getElementById('btn-' + id);
  const body = document.getElementById('body-' + id);
  const isOpen = openSet.has(id);
  btn.classList.toggle('open', isOpen);
  body.classList.toggle('open', isOpen);
  btn.querySelector('.btn-label').textContent = isOpen ? 'Đóng' : `${files[id].services.length} dịch vụ`;
}

const list = document.getElementById('cardList');
list.innerHTML = files.map((f, i) => `
  <div class="file-card ${f.isSelected ? 'selected' : ''}">
    <div class="card-top">
      <div class="pdf-icon"><i class="ti ti-file-type-pdf" aria-hidden="true"></i></div>
      <div class="card-main">
        <div class="card-name">${f.name}</div>
        <a class="view-link" href="#"><i class="ti ti-eye" aria-hidden="true"></i> Xem giấy tờ</a>
      </div>
      ${f.services && f.services.length ? `
        <button class="toggle-btn" id="btn-${i}" onclick="toggle(${i}, event)">
          <span class="btn-label">${f.services.length} dịch vụ</span>
          <i class="ti ti-chevron-down" aria-hidden="true"></i>
        </button>` : ''}
    </div>
    ${f.services && f.services.length ? `
      <div class="services-body" id="body-${i}">
        <div class="services-label">Danh sách dịch vụ</div>
        <div class="chips">${f.services.map(s => `<span class="chip">${s}</span>`).join('')}</div>
      </div>` : ''}
  </div>
`).join('');

window.toggle = toggle;
</script>
